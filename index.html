<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>JusCrim Monitor — Organização Criminosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#eef0f5;--surf:#fff;--surf2:#f5f6fa;
      --bdr:#e0e4ec;--bdr2:#cbd0db;
      --acc:#1a4f8b;--acc-lt:#ddeaf8;--acc2:#2565ab;
      --txt:#191c26;--txt2:#3b4152;--muted:#72798f;
      --stf:#1a4f8b;--stj:#16724a;--tjpe:#6b2fa0;
      --leg:#a04a15;--dje:#c47a00;
      --mig:#c4002b;--cnj:#006e5a;--jota:#1a4f8b;--diz:#2d6a00;
      --ia-bg:#f0f6ff;--ia-bdr:#b8d4f4;--ia-txt:#1a3859;
      --panel-bg:#1a3859;--panel-txt:#e8f0fb;
      --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --sh-md:0 4px 16px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.05);
      --r:7px;--sw:256px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}

    /* HEADER */
    header{background:var(--surf);border-bottom:1px solid var(--bdr);box-shadow:var(--sh-sm);position:sticky;top:0;z-index:100}
    .hdr{max-width:1480px;margin:0 auto;padding:0 1.4rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .logo{display:flex;align-items:center;gap:.7rem;text-decoration:none}
    .logo-icon{width:34px;height:34px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;box-shadow:0 2px 8px rgba(26,79,139,.3)}
    .logo-name{font-family:'Lora',serif;font-weight:700;font-size:1.05rem;color:var(--acc);line-height:1.1}
    .logo-tag{font-family:'JetBrains Mono',monospace;font-size:.51rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
    .hdr-r{display:flex;align-items:center;gap:.8rem}
    .live{display:flex;align-items:center;gap:.35rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted)}
    .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* LAYOUT */
    .layout{flex:1;max-width:1480px;margin:0 auto;width:100%;display:grid;grid-template-columns:var(--sw) 1fr}

    /* SIDEBAR */
    .sb{position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;background:var(--surf);border-right:1px solid var(--bdr);padding:1rem 0}
    .sb::-webkit-scrollbar{width:3px}
    .sb::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
    .sb-lbl{font-family:'JetBrains Mono',monospace;font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:.4rem 1.1rem .25rem}
    .sb-hoje{margin:.2rem .6rem .5rem;background:var(--acc);color:#fff;border:none;border-radius:var(--r);padding:.42rem .85rem;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;width:calc(100% - 1.2rem);text-align:left;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
    .sb-hoje:hover{background:var(--acc2)}
    .sb-div{height:1px;background:var(--bdr);margin:.55rem 1rem}

    /* TREE */
    .ty-yr-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.38rem 1.1rem;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--txt2);transition:background .12s}
    .ty-yr-btn:hover{background:var(--surf2)}
    .ty-chev{font-size:.55rem;color:var(--muted);transition:transform .18s}
    .ty-yr-btn.open .ty-chev{transform:rotate(90deg)}
    .ty-ms{display:none;padding-left:.55rem}
    .ty-ms.open{display:block}
    .ty-m-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.3rem 1rem .3rem .65rem;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.76rem;color:var(--txt2);transition:background .12s}
    .ty-m-btn:hover{background:var(--surf2)}
    .ty-m-btn.open{color:var(--acc);font-weight:500}
    .ty-ds{display:none;padding-left:.55rem}
    .ty-ds.open{display:block}
    .ty-d-btn{width:calc(100% - .9rem);display:flex;align-items:center;justify-content:space-between;padding:.26rem .7rem .26rem .6rem;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--muted);border-radius:5px;margin:1px .45rem;transition:background .12s,color .12s}
    .ty-d-btn:hover{background:var(--acc-lt);color:var(--acc)}
    .ty-d-btn.sel{background:var(--acc);color:#fff}
    .ty-badge{font-size:.57rem;padding:.07rem .35rem;border-radius:99px;background:var(--bdr);color:var(--muted)}
    .ty-d-btn.sel .ty-badge{background:rgba(255,255,255,.22);color:#fff}

    /* MAIN */
    .main{padding:1.4rem 1.5rem 3rem;min-height:calc(100vh - 56px)}

    /* PAGE HEADER */
    .pg-hdr{margin-bottom:1.1rem}
    .pg-title{font-family:'Lora',serif;font-size:1.4rem;font-weight:700;color:var(--txt);line-height:1.2}
    .pg-sub{font-size:.74rem;color:var(--muted);margin-top:.18rem}

    /* ── PAINEL IA DO DIA ──────────────────────────── */
    .painel-ia{
      background:var(--panel-bg);
      border-radius:var(--r);
      padding:1.2rem 1.4rem;
      margin-bottom:1.2rem;
      box-shadow:var(--sh-md);
      position:relative;
      overflow:hidden;
    }
    .painel-ia::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 70% 60% at 90% 20%,rgba(42,110,200,.18) 0%,transparent 70%);
      pointer-events:none;
    }
    .painel-top{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.9rem}
    .painel-chip{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--panel-txt);font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .65rem;border-radius:99px}
    .painel-chip-dot{width:5px;height:5px;border-radius:50%;background:#7dd3fc;flex-shrink:0}
    .painel-title{font-family:'Lora',serif;font-size:1rem;font-weight:700;color:#fff}
    .painel-body{font-size:.82rem;line-height:1.78;color:var(--panel-txt)}
    .painel-body p{margin-bottom:.55rem}
    .painel-body p:last-child{margin-bottom:0}
    .painel-body strong{color:#fff;font-weight:600}
    .painel-loading{display:flex;align-items:center;gap:.7rem;color:rgba(232,240,251,.6);font-size:.78rem}
    .p-dots span{width:6px;height:6px;border-radius:50%;background:#7dd3fc;display:inline-block;animation:pdot 1.2s ease-in-out infinite}
    .p-dots span:nth-child(2){animation-delay:.2s}
    .p-dots span:nth-child(3){animation-delay:.4s}
    @keyframes pdot{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}
    .painel-toggle{background:none;border:none;color:rgba(255,255,255,.5);font-size:.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;padding:.2rem .5rem;border-radius:4px;transition:color .15s}
    .painel-toggle:hover{color:#fff}

    /* STATS */
    .stats{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:1rem}
    .stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:.65rem .9rem;box-shadow:var(--sh-sm);display:flex;flex-direction:column;gap:.1rem;min-width:75px}
    .stat-v{font-family:'Lora',serif;font-size:1.4rem;font-weight:700;color:var(--acc);line-height:1}
    .stat-l{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}

    /* FILTERS */
    .filters{display:flex;align-items:center;gap:.3rem;margin-bottom:.85rem;flex-wrap:wrap}
    .fl{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-right:.2rem}
    .fb{background:var(--surf);border:1px solid var(--bdr2);color:var(--txt2);padding:.26rem .7rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.71rem;font-weight:500;cursor:pointer;transition:all .13s}
    .fb:hover{border-color:var(--acc);color:var(--acc)}
    .fb.on{background:var(--acc);border-color:var(--acc);color:#fff}
    .fb[data-s="STF"].on{background:var(--stf);border-color:var(--stf)}
    .fb[data-s="STJ"].on{background:var(--stj);border-color:var(--stj)}
    .fb[data-s="TJPE"].on{background:var(--tjpe);border-color:var(--tjpe)}
    .fb[data-s="LEG"].on{background:var(--leg);border-color:var(--leg)}
    .fb[data-s="DJe"].on{background:var(--dje);border-color:var(--dje)}
    .fb[data-s="Migalhas"].on{background:var(--mig);border-color:var(--mig)}
    .fb[data-s="Conjur"].on{background:var(--cnj);border-color:var(--cnj)}
    .fb[data-s="Jota"].on{background:var(--jota);border-color:var(--jota)}
    .fb[data-s="DizeODireito"].on{background:var(--diz);border-color:var(--diz)}

    /* IBAR */
    .ibar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;flex-wrap:wrap;gap:.35rem}
    .ibar-t{font-family:'JetBrains Mono',monospace;font-size:.59rem;color:var(--muted)}

    /* CARDS */
    #cards{display:flex;flex-direction:column;gap:.5rem}
    .card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;animation:up .27s ease both;transition:box-shadow .15s,border-color .15s}
    .card:hover{box-shadow:var(--sh-md);border-color:var(--bdr2)}
    @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    .card-top{display:grid;grid-template-columns:52px 1fr;gap:.85rem;padding:.9rem 1.1rem;cursor:default}
    .badge{width:52px;height:52px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.56rem;font-weight:500;text-align:center;line-height:1.2;align-self:start;flex-shrink:0}

    /* badge colors */
    .b-STF       {background:#e5edf8;color:var(--stf);border:1px solid #bcd0ef}
    .b-STJ       {background:#e3f4ec;color:var(--stj);border:1px solid #aedac4}
    .b-TJPE      {background:#f0eaf8;color:var(--tjpe);border:1px solid #d2b5ec}
    .b-LEG       {background:#faede5;color:var(--leg);border:1px solid #eabfa0}
    .b-DJe       {background:#fef7e0;color:var(--dje);border:1px solid #ecd88a}
    .b-Migalhas  {background:#fce8ec;color:var(--mig);border:1px solid #f0b0bc}
    .b-Conjur    {background:#e5f4f0;color:var(--cnj);border:1px solid #a0d5c8}
    .b-Jota      {background:#e5edf8;color:var(--jota);border:1px solid #bcd0ef}
    .b-DizeODireito{background:#edf7e5;color:var(--diz);border:1px solid #b0d898}

    .card-body{min-width:0}
    .card-title{font-family:'Lora',serif;font-size:.92rem;font-weight:600;color:var(--txt);line-height:1.4;margin-bottom:.28rem}
    .card-excerpt{font-size:.77rem;color:var(--txt2);line-height:1.62;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.42rem}
    .card-meta{display:flex;gap:.6rem;flex-wrap:wrap}
    .card-meta span{font-family:'JetBrains Mono',monospace;font-size:.59rem;color:var(--muted)}
    .card-meta span b{color:var(--txt2);font-weight:500}
    .card-link{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(--acc);text-decoration:none;font-weight:500;margin-top:.38rem;transition:color .12s}
    .card-link:hover{color:var(--acc2);text-decoration:underline}

    /* ── RESUMO IA NO CARD ──────────────────────────── */
    .card-ia{border-top:1px solid var(--ia-bdr);background:var(--ia-bg);padding:.8rem 1.1rem .8rem calc(52px + .85rem + 1.1rem)}
    .ia-chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--acc);color:#fff;font-family:'JetBrains Mono',monospace;font-size:.56rem;font-weight:500;letter-spacing:.06em;padding:.18rem .5rem;border-radius:99px;margin-bottom:.42rem}
    .ia-chip-dot{width:4px;height:4px;border-radius:50%;background:#7dd3fc}
    .ia-text{font-size:.79rem;line-height:1.72;color:var(--ia-txt)}

    /* STATE BOXES */
    .state{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:3rem 2rem;text-align:center;box-shadow:var(--sh-sm)}
    .state p{font-size:.8rem;color:var(--muted);line-height:1.6}
    .spinner{width:27px;height:27px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .7rem}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* RESPONSIVE */
    @media(max-width:800px){
      .layout{grid-template-columns:1fr}
      .sb{position:static;height:auto;border-right:none;border-bottom:1px solid var(--bdr)}
      .card-ia{padding:.8rem 1rem}
      .hdr-r .live{display:none}
    }
  </style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="#">
      <div class="logo-icon">⚖</div>
      <div>
        <div class="logo-name">JusCrim Monitor</div>
        <div class="logo-tag">Organização Criminosa · Atualização diária com IA</div>
      </div>
    </a>
    <div class="hdr-r">
      <div class="live"><div class="dot"></div><span id="hdr-dt">—</span></div>
    </div>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-lbl">Hoje</div>
    <button class="sb-hoje" id="btn-hoje" onclick="irHoje()">
      <span id="sb-hoje-label">—</span>
      <span id="sb-hoje-n" class="ty-badge" style="background:rgba(255,255,255,.22);color:#fff">—</span>
    </button>
    <div class="sb-div"></div>
    <div class="sb-lbl">Histórico</div>
    <div id="tree"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Cabeçalho da página -->
    <div class="pg-hdr">
      <div class="pg-title" id="pg-title">Carregando…</div>
      <div class="pg-sub"   id="pg-sub"></div>
    </div>

    <!-- Painel IA do dia -->
    <div class="painel-ia" id="painel-ia">
      <div class="painel-top">
        <div>
          <div class="painel-chip"><span class="painel-chip-dot"></span>Painel Executivo — Gemini IA</div>
          <div class="painel-title" id="painel-title" style="margin-top:.4rem">Análise do dia</div>
        </div>
        <button class="painel-toggle" id="painel-toggle" onclick="togglePainel()">Recolher ▲</button>
      </div>
      <div id="painel-body" class="painel-body">
        <div class="painel-loading"><div class="p-dots"><span></span><span></span><span></span></div><span>Carregando análise…</span></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-v" id="s-tot">—</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-v" id="s-stf" style="color:var(--stf)">—</div><div class="stat-l">STF</div></div>
      <div class="stat"><div class="stat-v" id="s-stj" style="color:var(--stj)">—</div><div class="stat-l">STJ</div></div>
      <div class="stat"><div class="stat-v" id="s-tjpe" style="color:var(--tjpe)">—</div><div class="stat-l">TJPE</div></div>
      <div class="stat"><div class="stat-v" id="s-leg" style="color:var(--leg)">—</div><div class="stat-l">Leg.</div></div>
      <div class="stat"><div class="stat-v" id="s-dje" style="color:var(--dje)">—</div><div class="stat-l">DJe</div></div>
      <div class="stat"><div class="stat-v" id="s-imp" style="color:var(--mig)">—</div><div class="stat-l">Imprensa</div></div>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <span class="fl">Fonte:</span>
      <button class="fb on" data-s="ALL">Todos</button>
      <button class="fb" data-s="STF">STF</button>
      <button class="fb" data-s="STJ">STJ</button>
      <button class="fb" data-s="TJPE">TJPE</button>
      <button class="fb" data-s="LEG">Legislação</button>
      <button class="fb" data-s="DJe">DJe</button>
      <button class="fb" data-s="Migalhas">Migalhas</button>
      <button class="fb" data-s="Conjur">Conjur</button>
      <button class="fb" data-s="Jota">Jota</button>
      <button class="fb" data-s="DizeODireito">Dizer o Direito</button>
    </div>

    <div class="ibar">
      <span class="ibar-t" id="ib-update">Carregando…</span>
      <span class="ibar-t" id="ib-count"></span>
    </div>

    <div id="cards">
      <div class="state" id="st-load"><div class="spinner"></div><p>Carregando dados…</p></div>
    </div>

  </main>
</div>

<script>
const MESES      = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_C    = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const IMPRENSA   = ['Migalhas','Conjur','Jota','DizeODireito'];

let historico    = {};
let dataAtiva    = null;
let filtro       = 'ALL';
let painelAberto = true;
const dataHoje   = new Date().toISOString().slice(0,10);

// ── Inicialização ─────────────────────────────────────────────────────
async function iniciar() {
  try {
    const r = await fetch('data/indice.json?t=' + Date.now());
    if (!r.ok) throw new Error('sem indice');
    const idx = await r.json();
    await Promise.all((idx.datas||[]).map(async dk => {
      try {
        const rr = await fetch(`data/${dk}.json?t=` + Date.now());
        if (rr.ok) historico[dk] = await rr.json();
      } catch {}
    }));
  } catch {
    try {
      const r = await fetch('data/resultados.json?t=' + Date.now());
      if (!r.ok) throw new Error();
      const d  = await r.json();
      const dk = (d.data||d.gerado_em||dataHoje).slice(0,10);
      historico[dk] = d;
    } catch { mostrarErro(); return; }
  }
  construirArvore();
  irHoje();
}

// ── Navegação ──────────────────────────────────────────────────────────
function irHoje() {
  const datas = Object.keys(historico).sort().reverse();
  selecionar(historico[dataHoje] ? dataHoje : (datas[0] || dataHoje));
}

function selecionar(dk) {
  dataAtiva = dk;
  filtro    = 'ALL';
  document.querySelectorAll('.fb').forEach(b => b.classList.toggle('on', b.dataset.s==='ALL'));
  document.querySelectorAll('.ty-d-btn').forEach(b => b.classList.remove('sel'));
  const btn = document.getElementById('day-'+dk);
  if (btn) btn.classList.add('sel');

  const entrada = historico[dk] || {resultados:[]};
  const items   = entrada.resultados || [];
  const [y,m,d] = dk.split('-');
  const mesN    = MESES[parseInt(m)-1]||m;
  const isHoje  = dk === dataHoje;

  document.getElementById('pg-title').textContent =
    isHoje ? `Hoje — ${parseInt(d)} de ${mesN} de ${y}` : `${parseInt(d)} de ${mesN} de ${y}`;
  document.getElementById('pg-sub').textContent =
    `Coleta automática das últimas ${entrada.janela_horas||24}h · "${entrada.termo_busca||'organização criminosa'}"`;

  const gerado = entrada.gerado_em ? new Date(entrada.gerado_em).toLocaleString('pt-BR') : '—';
  document.getElementById('ib-update').textContent = `Gerado em: ${gerado}`;
  document.getElementById('hdr-dt').textContent    = gerado.slice(0,16);
  document.getElementById('sb-hoje-label').textContent = `${parseInt(d)}/${parseInt(m)} — Hoje`;
  document.getElementById('sb-hoje-n').textContent = items.length;

  renderPainel(entrada.resumo_dia || '');
  renderStats(items);
  renderCards(items);
}

// ── Painel IA ──────────────────────────────────────────────────────────
function renderPainel(texto) {
  const body = document.getElementById('painel-body');
  if (!texto || texto.length < 20) {
    body.innerHTML = '<p style="color:rgba(232,240,251,.5);font-size:.78rem">Painel indisponível — configure GEMINI_API_KEY nos GitHub Secrets para ativar.</p>';
    return;
  }
  // Converte markdown simples em HTML
  const html = texto
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .split('\n').filter(l => l.trim())
    .map(l => `<p>${l}</p>`).join('');
  body.innerHTML = html;
}

function togglePainel() {
  painelAberto = !painelAberto;
  const body = document.getElementById('painel-body');
  const btn  = document.getElementById('painel-toggle');
  body.style.display  = painelAberto ? '' : 'none';
  btn.textContent     = painelAberto ? 'Recolher ▲' : 'Expandir ▼';
}

// ── Stats ────────────────────────────────────────────────────────────
function renderStats(items) {
  const c = {STF:0,STJ:0,TJPE:0,LEG:0,DJe:0,imp:0};
  items.forEach(i => {
    if (i.fonte in c) c[i.fonte]++;
    else if (IMPRENSA.includes(i.fonte)) c.imp++;
  });
  document.getElementById('s-tot').textContent  = items.length;
  document.getElementById('s-stf').textContent  = c.STF;
  document.getElementById('s-stj').textContent  = c.STJ;
  document.getElementById('s-tjpe').textContent = c.TJPE;
  document.getElementById('s-leg').textContent  = c.LEG;
  document.getElementById('s-dje').textContent  = c.DJe;
  document.getElementById('s-imp').textContent  = c.imp;
}

// ── Cards ────────────────────────────────────────────────────────────
function renderCards(items) {
  const wrap   = document.getElementById('cards');
  const lista  = filtro === 'ALL' ? items : items.filter(i => i.fonte === filtro);
  document.getElementById('ib-count').textContent = `${lista.length} resultado(s)`;

  if (!lista.length) {
    wrap.innerHTML = '<div class="state"><p>Nenhum resultado para este filtro.</p></div>';
    return;
  }

  wrap.innerHTML = '';
  lista.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (idx * .032) + 's';

    const fonte   = esc(item.fonte||'');
    const label   = esc(item.label||item.fonte||'');
    const titulo  = esc(item.titulo||'');
    const resumo  = esc(item.resumo||'');
    const rIA     = esc(item.resumo_ia||'');
    const numero  = esc(item.numero||'');
    const relator = esc(item.relator||'');
    const data_   = esc(item.data||'');
    const url     = item.url||'#';

    const badgeLabel = label.length > 10 ? label.slice(0,9)+'…' : label;

    card.innerHTML = `
      <div class="card-top">
        <div class="badge b-${item.fonte}" title="${label}">${badgeLabel}</div>
        <div class="card-body">
          <div class="card-title">${titulo}</div>
          ${resumo ? `<div class="card-excerpt">${resumo}</div>` : ''}
          <div class="card-meta">
            ${data_   ? `<span>Data: <b>${data_}</b></span>` : ''}
            ${numero  ? `<span>Nº: <b>${numero}</b></span>` : ''}
            ${relator ? `<span>Rel.: <b>${relator}</b></span>` : ''}
          </div>
          ${url !== '#' ? `<a class="card-link" href="${url}" target="_blank" rel="noopener">Acessar documento completo ↗</a>` : ''}
        </div>
      </div>
      ${rIA ? `
      <div class="card-ia">
        <div class="ia-chip"><span class="ia-chip-dot"></span>Análise IA — Gemini</div>
        <div class="ia-text">${rIA}</div>
      </div>` : ''}
    `;
    wrap.appendChild(card);
  });
}

// ── Árvore ───────────────────────────────────────────────────────────
function construirArvore() {
  const root = document.getElementById('tree');
  root.innerHTML = '';
  const arv = {};
  Object.keys(historico).sort().reverse().forEach(dk => {
    const [y,m,d] = dk.split('-');
    if (!arv[y]) arv[y]={};
    if (!arv[y][m]) arv[y][m]=[];
    arv[y][m].push(d);
  });
  Object.keys(arv).sort().reverse().forEach((ano,ai) => {
    const yDiv = document.createElement('div');
    const yBtn = document.createElement('button');
    yBtn.className = 'ty-yr-btn' + (ai===0?' open':'');
    yBtn.innerHTML = `<span>📅 ${ano}</span><span class="ty-chev">▶</span>`;
    const mDiv = document.createElement('div');
    mDiv.className = 'ty-ms' + (ai===0?' open':'');
    yBtn.onclick = () => { mDiv.classList.toggle('open'); yBtn.classList.toggle('open'); };
    Object.keys(arv[ano]).sort().reverse().forEach((mes,mi) => {
      const mBtn = document.createElement('button');
      mBtn.className = 'ty-m-btn' + (ai===0&&mi===0?' open':'');
      mBtn.innerHTML = `<span>${MESES_C[parseInt(mes)-1]||mes}</span><span class="ty-badge">${arv[ano][mes].length}</span>`;
      const dDiv = document.createElement('div');
      dDiv.className = 'ty-ds' + (ai===0&&mi===0?' open':'');
      mBtn.onclick = () => { dDiv.classList.toggle('open'); mBtn.classList.toggle('open'); };
      arv[ano][mes].sort().reverse().forEach(dia => {
        const dk  = `${ano}-${mes}-${dia}`;
        const qtd = historico[dk]?.resultados?.length||0;
        const isH = dk===dataHoje;
        const dBtn = document.createElement('button');
        dBtn.className = 'ty-d-btn';
        dBtn.id = 'day-'+dk;
        dBtn.innerHTML = `<span>${dia}/${mes}${isH?' ✦':''}</span><span class="ty-badge">${qtd}</span>`;
        dBtn.onclick = () => selecionar(dk);
        dDiv.appendChild(dBtn);
      });
      mDiv.appendChild(mBtn); mDiv.appendChild(dDiv);
    });
    yDiv.appendChild(yBtn); yDiv.appendChild(mDiv);
    root.appendChild(yDiv);
  });
}

function mostrarErro() {
  document.getElementById('cards').innerHTML = '<div class="state"><p>Nenhuma coleta realizada ainda.<br>Vá em <b>Actions → Coleta Diária → Run workflow</b> para gerar os primeiros dados.</p></div>';
  document.getElementById('pg-title').textContent = 'Erro ao carregar';
}

// Filtros
document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    filtro = btn.dataset.s;
    if (dataAtiva) renderCards(historico[dataAtiva]?.resultados||[]);
  });
});

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

iniciar();
